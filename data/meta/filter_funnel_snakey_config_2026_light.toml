# Light theme overrides for 2026 snakey diagram.
# Inherits shared layout/style defaults from the base config.
extends = "filter_funnel_snakey_config_2026_base.toml"

[style]
background_start = "#f6e9dd"
background_end = "#e6cdb8"

title_color = "#4c2e1f"
subtitle_color = "#6e4530"

main_trunk_color = "#b06e44"
main_trunk_opacity = 1.0
main_trunk_node_fill = "#8f5433"

exclusion_branch_color = "#cf8b5f"
exclusion_branch_opacity = 1.0
exclusion_node_fill = "#ab6f49"

text_color = "#2f1d14"
text_subtle_color = "#5a3a2b"
context_color = "#7a5642"

highlight_node_fill = "#d28a56"
highlight_node_ring_color = "#fff3e8"
highlight_node_ring_width = 3.0
highlight_badge_color = "#b56a37"
highlight_stage_label_title_color = "#a55f31"
