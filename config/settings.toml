# benefind configuration
# ---------------------
# Copy this file to settings.local.toml for local overrides (gitignored).

[general]
# Project data directory (relative to project root)
data_dir = "data"

# Log level: DEBUG, INFO, WARNING, ERROR
log_level = "INFO"

[pdf]
# URL of the source PDF from Kanton Zürich (current publication)
source_url = "https://www.zh.ch/content/dam/zhweb/bilder-dokumente/themen/steuern-finanzen/steuern/juristischepersonen/steuerbefreite-institutionen/steuerbefreiung-online/31.12.2025_hauptdatei_steuerbefreite_jp_zh_2026.pdf"

# Local filename for the downloaded PDF
filename = "steuerbefreite_jp.pdf"

[filtering]
# Fuzzy match threshold (0-100). Below this, flag for manual review.
fuzzy_match_threshold = 85

# If true, also include orgs where location could not be determined
include_unknown_locations = false

# If true, keep only organizations in category (a)
use_category_filter = true

# Warn when this many manual location reviews remain after filtering
manual_review_warning_threshold = 50

# If true, only accept exact location token matches (no fuzzy fallbacks)
exact_match_only = true

[scraping]
# Delay between HTTP requests in seconds
request_delay_seconds = 2.0

# Maximum number of pages to scrape per organization
max_pages_per_org = 10

# HTTP timeout in seconds
timeout_seconds = 30

# User-Agent string for HTTP requests
user_agent = "benefind/0.1 (nonprofit research; https://hfm-winti.ch)"

# Respect robots.txt
respect_robots_txt = true

# Prepare-scraping scope: keep same-host URLs only by default
prepare_include_subdomains = false

# Prepare-scraping ranking and discovery limits
prepare_keep_ranked_urls_per_org = 80
prepare_discovery_safety_cap = 2000
prepare_stale_sitemap_days = 365
prepare_section_cap_per_org = 20

# Prepare-scraping discovery limits (sitemap-first, then local-link fallback)
prepare_sitemap_max_files = 50
prepare_sitemap_max_depth = 4
prepare_fallback_max_visits = 120

# Concurrent organization-level workers for prepare-scraping
prepare_max_workers = 32

# Post-scrape cleaning: segment-level dedup across pages within one organization
# Segments shorter than this are never considered for duplicate removal
clean_min_segment_chars = 80

# Duplicate segment must appear in at least this page ratio for removal
# (and at least 2 pages overall)
clean_min_duplicate_page_ratio = 0.6

# Keep one canonical copy of duplicate segments in the first page
clean_retain_one_duplicate_copy = true

# If cleaned unique text falls below this threshold, quality review can flag it
clean_min_usable_chars_per_org = 1

[search]
# Search provider: "brave"
provider = "brave"

# Search engine used by the website-review shortcut (`benefind review websites`)
# Supported: "duckduckgo", "google"
review_search_engine = "google"

# Number of search results to consider
max_results = 10

# Run a second query when first-pass best score is below this threshold.
fallback_score_threshold = 25

# Run a second query when top and runner-up domain scores are too close.
fallback_min_score_gap = 8

# Score >= this value is accepted directly.
auto_accept_score = 40

# Score band that goes through LLM web verification before decision.
llm_verify_min_score = 20
llm_verify_max_score = 39

# If two independent providers agree on a URL, accept at this score threshold.
cross_provider_agree_min_score = 20

# Enable LLM web verification stage in discover.
llm_verify_enabled = true

# Max search request rate (Brave API limit: 50 req/s)
max_requests_per_second = 45.0

# Concurrent workers for website discovery
max_workers = 20

# Legacy fallback delay between requests in seconds (used only when max_requests_per_second <= 0)
request_delay_seconds = 0.0

# HTTP timeout in seconds
timeout_seconds = 15

# Max retries for transient search/API errors (429, 5xx, network)
max_retries = 3

# Base backoff delay for retries in seconds (exponential backoff)
retry_backoff_seconds = 1.0

# Firecrawl search fallback (uses Google-based index, better coverage for small orgs)
# Triggered when Brave + LLM fail to converge on a confident answer.
firecrawl_enabled = true

# Number of search results to request from Firecrawl
firecrawl_max_results = 10

# HTTP timeout in seconds for Firecrawl API calls
firecrawl_timeout_seconds = 30

# Max retries for transient Firecrawl API errors
firecrawl_max_retries = 2

[llm]
# OpenAI model to use for evaluation
model = "gpt-4o-mini"

# Temperature for LLM calls (lower = more deterministic)
temperature = 0.1

# Maximum tokens per response
max_tokens = 1000

# Confidence threshold (0.0-1.0). Below this, flag for manual review.
confidence_threshold = 0.7
