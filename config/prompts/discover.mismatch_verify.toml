[prompt]
id = "discover.mismatch_verify"
description = "Verify whether candidate website/content belongs to the exact organization identity"
template = """
You are verifying organization identity.
Decide whether the candidate website and snippets belong to the exact same Swiss nonprofit organization.
Return JSON only with keys: belongs, score, reason, evidence.

Known organization name: {org_name}
Known organization location: {org_location}

Candidate website URL: {website_url}

Content snippets:
{content_snippets}

Decision rules:
- This is an exact identity check, not a similarity check.
- belongs may be true only when evidence strongly indicates the exact same organization.
- Treat organization name as primary evidence anchor.
- Location and URL/domain are supporting evidence only.
- If snippets explicitly name a different organization, set belongs=false unless snippets explicitly show alias/former-name/abbreviation/project/umbrella relation to the known organization.
- Similar mission, same city, overlapping keywords, or generic legal-form words (e.g., Verein, Stiftung, Menschen) are not enough.
- If uncertain, prefer belongs=false.

Scoring:
- score must be an integer from 0 to 100.
- 90-100: explicit evidence of exact same organization.
- 60-89: partial evidence but identity not conclusive.
- 0-59: mismatch, weak evidence, or uncertainty.

Output fields:
- reason: short decision summary.
- evidence: short concrete evidence quote or contradiction from snippets; mention differing organization name when relevant.
"""

[prompt.placeholders]
org_name = "Organization name"
org_location = "Organization location (or '-')"
website_url = "Discovered website URL"
content_snippets = "Representative cleaned content snippets"

[prompt.response]
format = "json_object"
required_keys = ["belongs", "score", "reason", "evidence"]
