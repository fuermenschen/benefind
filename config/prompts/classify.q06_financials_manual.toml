[prompt]
id = "classify.q06_financials_manual"
description = "Manual financial enrichment question"
template = "Manual question. No LLM prompt is used in execution.mode=manual."

[classify]
id = "q06_financials_manual"
enabled = true
description = "Manual enrichment of annual earnings and donation figures"
order = 60
ask_max_attempts = 1

[classify.execution]
mode = "manual"

[classify.source]
kind = "pages_cleaned"
max_snippets = 1
max_snippet_chars = 200
min_snippet_chars = 0

[classify.output]
strict_output_keys = true

[[classify.output.fields]]
key = "information_status"
kind = "string"
lowercase = true
required = true
allowed = ["found", "partial", "not_found"]

[[classify.output.fields]]
key = "fiscal_year"
kind = "number"
min = 1900
max = 2100

[[classify.output.fields]]
key = "total_earnings_chf"
kind = "number"
min = 0

[[classify.output.fields]]
key = "donated_amount_chf"
kind = "number"
min = 0

[classify.manual]

[classify.conclude]
apply_exclusion = false

[classify.review]

[[classify.review.fields]]
label = "Information status"
field = "information_status"

[[classify.review.fields]]
label = "Fiscal year"
field = "fiscal_year"

[[classify.review.fields]]
label = "Total earnings (CHF)"
field = "total_earnings_chf"

[[classify.review.fields]]
label = "Donated amount (CHF)"
field = "donated_amount_chf"
