[map]
style_url = "https://vectortiles.geo.admin.ch/styles/ch.swisstopo.lightbasemap.vt/style.json"
default_zoom = 12.8
base_zoom_for_coverage = 9.6
width_px = 900
height_px = 500
max_render_dim_px = 10000
max_render_pixels = 60000000
pad_lon = 0.03
pad_lat = 0.02
render_wait_ms = 350
render_timeout_ms = 20000
probe_vector_tile = true
projection_meta_version = 2

[map.boundary]
layer_id = "ch.swisstopo.swissboundaries3d-bezirk-flaeche.fill"
feature_id = 110
sr = 4326

[map.marker]
outer_radius_px = 30
inner_radius_px = 20
outer_color = "#ea580c"
inner_color = "#9a3412"

[template]
html_file = "config/review_pdf_template.html"

[texts.fallbacks]
org_title = "Unbekannte Organisation"
org_id = "unknown"
