[map]
style_url = "https://vectortiles.geo.admin.ch/styles/ch.swisstopo.lightbasemap.vt/style.json"
default_zoom = 12.8
base_zoom_for_coverage = 9.6
width_px = 900
height_px = 500
max_render_dim_px = 10000
max_render_pixels = 60000000
pad_lon = 0.03
pad_lat = 0.02
render_wait_ms = 350
render_timeout_ms = 20000
probe_vector_tile = true

[map.boundary]
layer_id = "ch.swisstopo.swissboundaries3d-bezirk-flaeche.fill"
feature_id = 110
sr = 4326

[map.marker]
outer_radius_px = 30
inner_radius_px = 20
outer_rgba = [255, 255, 255, 255]
inner_rgba = [220, 25, 32, 255]

[layout.page]
margin = 36
title_max_chars = 120
title_y = 50
meta_org_id_y = 66
meta_export_y = 78
top_y = 104

[layout.qr]
size = 72
y = 86

[layout.map_box]
x_offset_from_right = 210
y_offset_from_top = 156
width = 200
height = 118
inner_padding = 3
title_offset_y = 12
image_top_padding = 20

[layout.corner_markers]
offset = 16
size = 16
stroke = 1.5

[layout.sections]
master_height = 156
master_title_y = 18
master_start_y = 36
target_gap_from_master = 180
target_height = 102
target_title_y = 20
target_start_y = 38
finance_gap_from_target = 124
finance_height = 94
finance_title_y = 20
finance_start_y = 38
summary_gap_from_finance = 116
summary_height = 114
summary_title_y = 20
summary_start_y = 38
manual_gap_from_summary = 136
manual_height = 86
manual_title_y = 20
manual_start_y = 38
manual_check_step_y = 14

[layout.kv]
value_offset_x = 110
line_gap_after = 3
line_gap_after_compact = 2
leading = 11
max_lines = 3
master_value_width = 380
target_value_width = 420
finance_value_width = 420

[layout.footer]
y = 24

[typography]
font_regular = "Helvetica"
font_bold = "Helvetica-Bold"
title_size = 17
meta_size = 9
