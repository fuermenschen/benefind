exclude_regexes = [
  "^(wp-content|uploads?|fileadmin|_files|cdn-cgi|email-protection|resources?|assets?|static|media|images?|img|files?|downloads?|download|pdf|jpg|jpeg|png|gif|svg|xml|rss|json|index\\.php|index\\.html|wp-login\\.php|sitemap(\\.html)?|search|cart|warenkorb|customer|uncategorized|fileservlet|content|sites?)$",
  ".*\\.(pdf|jpg|jpeg|png|gif|svg|xml|rss|json|html|php)$",
  "^(login|anmelden|suche|suchen|profile|intern|wp-login|passwort-.+)$",
  "^.*cookie.*$",
  "^.*login.*$",
  "^(app|component|type|data|documents?|user-upload|doc|createpdf|mpdf|thumbs|ugd)$",
  "^(test|testseite|hello-world|hallo-welt)$",
  "^(imprint|english|footer|nutzungshinweise)$",
  "^cookie-einstellungen$",
  "^newsletter-anmeldung$",
  "^a-z$",
  "^datenschutzerklarung$",
  "^intranet$",
  "^profil$",
  "^sample-page$",
  "^elementor(-hf)?$",
  "^plugins$",
  "^public$",
  "^processed$",
  "^pictures$",
  "^view$",
  "^rte$",
  "^rtr$",
  "^uproc$",
  "^\\.cm4all$",
]

